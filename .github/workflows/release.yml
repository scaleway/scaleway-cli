name: release
permissions:
  contents: write
  id-token: write # Required for OIDC (MCP and scaleway-cli-wasm)

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release job for Scaleway-cli
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to DockerHub Registry
        run: echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Install pnpm for wasm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: "wasm/package.json"

      - name: Build WebAssembly version
        run: VERSION=${{ github.ref_name }} ./scripts/build-wasm.sh

      - name: Configure WebAssembly package version
        working-directory: wasm
        run: pnpm version ${{ github.ref_name }}

      - name: Publish package
        working-directory: wasm
        run: pnpm publish --no-git-checks --provenance

      - name: Putting the git state back to the original to avoid having a dirty git state
        run: git checkout -- wasm/package.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "${{ vars.GORELEASER_VERSION || '~> v2' }}"
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
