name: Lint

permissions:
  contents: read

on:
  pull_request:
  merge_group:

jobs:
  actionlint:
    name: Github Actions lint
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check workflow files
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color -ignore SC2086

  dockerlint:
    name: dockerfile-lint
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: dockerfile-lint
        run: docker build --check .

  golangci:
    name: golangci-lint
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go # We need the go binary to be available to run some checks (formatter, gomod_salt, ...)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # Required: the version of golangci-lint is required and must be specified without patch version: we always use the latest patch version.
          version: v2.12.2
          args: --timeout 10m

  spelling:
    name: Spell Check with Typos
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install wget
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wget
      - name: Spell Check Repo
        uses: crate-ci/typos@44e2070e6017f834bf069503acb35ca0ca0b75f2 # v1.47.1
        env:
          CLICOLOR: 1

  rumdl:
    name: rumdl
    runs-on: "${{ vars.RUNS_ON || 'ubuntu-latest' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: rumdl
        uses: rvben/rumdl@c865358794ca767361fe7d2947ad631ac8a89996 # v0.2.10
